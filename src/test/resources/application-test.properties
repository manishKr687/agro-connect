spring.datasource.url=jdbc:h2:mem:agroconnect;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true

app.jwt.secret=test-secret-key-that-is-at-least-32-characters
app.jwt.expiration-ms=1800000
app.jwt.refresh-expiration-ms=604800000
app.jwt.issuer=agroconnect-test
app.cors.allowed-origins=http://localhost:5173
app.password-reset.email-expiration-ms=1800000
app.password-reset.sms-expiration-ms=600000
app.password-reset.debug-enabled=true
app.password-reset.frontend-base-url=http://localhost:5173
app.rate-limit.auth.requests-per-minute=1000
app.rate-limit.auth.username-requests-per-minute=1000
app.security.max-login-attempts=50
app.security.lockout-duration-minutes=15
app.bootstrap.admin.phone-number=
app.bootstrap.admin.password=

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
