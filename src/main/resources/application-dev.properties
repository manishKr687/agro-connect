spring.datasource.url=jdbc:postgresql://localhost:5432/agroconnect
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=dev-only-insecure-secret-do-not-use-in-prod
app.cors.allowed-origins=http://localhost:3000
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=admin123
app.bootstrap.admin.reset-password=true
app.rate-limit.auth.requests-per-minute=100
app.rate-limit.auth.username-requests-per-minute=20
app.security.max-login-attempts=10
app.security.lockout-duration-minutes=5
app.sse.max-connections-per-ip=10
app.sse.connections-per-minute=30
spring.flyway.baseline-on-migrate=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.com.agroconnect=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15thread]){faint} %clr(%-40.40logger{39}){cyan} %msg%n
