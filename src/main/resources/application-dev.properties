spring.datasource.url=jdbc:postgresql://localhost:5432/agroconnect
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=dev-only-insecure-secret-do-not-use-in-prod
app.cors.allowed-origins=http://localhost:3000
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=admin123
app.rate-limit.auth.requests-per-minute=100
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.root=INFO
logging.level.com.agroconnect=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%15.15thread]){faint} %clr(%-40.40logger{39}){cyan} %msg%n
