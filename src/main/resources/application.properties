server.port=${PORT:8081}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:1800000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.jwt.issuer=${JWT_ISSUER:agroconnect}
app.password-reset.email-expiration-ms=${PASSWORD_RESET_EMAIL_EXPIRATION_MS:1800000}
app.password-reset.sms-expiration-ms=${PASSWORD_RESET_SMS_EXPIRATION_MS:600000}
app.password-reset.debug-enabled=${PASSWORD_RESET_DEBUG_ENABLED:false}
app.password-reset.frontend-base-url=${PASSWORD_RESET_FRONTEND_BASE_URL:http://localhost:5173}
app.password-reset.mail.enabled=${PASSWORD_RESET_MAIL_ENABLED:false}
app.password-reset.mail.from=${PASSWORD_RESET_MAIL_FROM:}
app.password-reset.mail.app-name=${PASSWORD_RESET_MAIL_APP_NAME:AgroConnect}
app.password-reset.sms.enabled=${PASSWORD_RESET_SMS_ENABLED:false}
app.password-reset.sms.provider=${PASSWORD_RESET_SMS_PROVIDER:TWILIO}
app.password-reset.sms.from=${PASSWORD_RESET_SMS_FROM:}
app.password-reset.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.password-reset.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.password-reset.sms.twilio.api-base-url=${TWILIO_API_BASE_URL:https://api.twilio.com}

# Actuator — only health exposed by default, details hidden
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Crop normalizer microservice
crop.normalizer.url=${CROP_NORMALIZER_URL:http://localhost:8000}
